live_config_reload = true
working_directory = "None"

# Themes --
import = [ 
  # -- Themes --
  #"~/.config/alacritty/catppuccin-macchiato.toml", 
  "~/.config/alacritty/nordic.toml", 
  # "~/.config/alacritty/xcad.toml",
  # "~/.config/alacritty/dracula.toml",
  # "~/.config/alacritty/catppuccin-mocha.toml",
  # "~/.config/alacritty/solarized_dark.toml",
  # "~/.config/alacritty/solarized-osaka.toml",
]

[window]
title = "Alacritty"
blur = false
opacity = 0.88
padding.x = 5
padding.y = 5
startup_mode = "Maximized"
[window.dimensions]
columns = 110
lines = 28

[cursor.style]
shape= "Beam"
blinking = "Never"

[colors]
#transparent_background_colors = true
draw_bold_text_with_bright_colors = true

[env]
TERM = "xterm-256color"

[font]
#glyph_offset = { x = 1, y = 0 }
normal.family = "CodeNewRoman Nerd Font"
normal.style = "Bold"
size = 13.0

[font.bold]
family = "CodeNewRoman Nerd Font"
style = "Bold"

[font.italic]
family = "CodeNewRoman Nerd Font"
style = "Italic"
